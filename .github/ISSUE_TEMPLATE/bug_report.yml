name: 🐛 Bug Report
description: Report a bug, crash, or unexpected behaviour
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: easyDataSync version
      description: Find this under "Info → About" or in the title bar
      placeholder: "v1.2.1"
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - GUI (Setup installer)
        - GUI (portable .exe)
        - CLI (portable .exe)
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: License tier
      options:
        - Free
        - Pro
        - Business
        - Enterprise
        - Trial
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you do, what did you expect, what happened instead?
      placeholder: |
        1. Opened easyDataSync
        2. Loaded source.xlsx
        3. Clicked …
        4. Expected: …
        5. Actual: …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error message
      description: |
        Paste any error message or relevant log output. Logs are at `%LOCALAPPDATA%\easyDataSync\logs\`.
      render: shell

  - type: textarea
    id: files
    attributes:
      label: Source / target files (optional)
      description: |
        If safe to share, attach a minimal example. **Never share confidential data** — replace real values with dummy data first.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this bug has not been reported yet
          required: true

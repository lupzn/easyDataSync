name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! The clearer you describe the use case, the faster it can land.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain or limitation you're hitting today.
      placeholder: "Right now I have to … because easyDataSync can't …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like easyDataSync to handle this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or approaches you've tried.

  - type: dropdown
    id: tier
    attributes:
      label: Which tier should this belong to?
      description: Help with positioning — purely advisory.
      options:
        - Free (everyone benefits)
        - Pro (power-user feature)
        - Business (commercial / automation)
        - Enterprise (custom / SLA)
        - No opinion
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this feature has not been requested yet
          required: true
